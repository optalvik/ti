<?xml version="1.0" encoding="UTF-8"?>
<svg width="1920" height="800" viewBox="0 0 1920 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1854"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b388ff"/>
      <stop offset="100%" style="stop-color:#7c4dff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="800" fill="url(#sky)"/>

  <!-- Subtle dot grid -->
  <g fill="#7c4dff" opacity="0.06">
    <circle cx="80" cy="80" r="1.5"/><circle cx="160" cy="80" r="1.5"/><circle cx="240" cy="80" r="1.5"/><circle cx="320" cy="80" r="1.5"/><circle cx="400" cy="80" r="1.5"/>
    <circle cx="480" cy="80" r="1.5"/><circle cx="560" cy="80" r="1.5"/><circle cx="640" cy="80" r="1.5"/><circle cx="720" cy="80" r="1.5"/><circle cx="800" cy="80" r="1.5"/>
    <circle cx="880" cy="80" r="1.5"/><circle cx="960" cy="80" r="1.5"/><circle cx="1040" cy="80" r="1.5"/><circle cx="1120" cy="80" r="1.5"/><circle cx="1200" cy="80" r="1.5"/>
    <circle cx="1280" cy="80" r="1.5"/><circle cx="1360" cy="80" r="1.5"/><circle cx="1440" cy="80" r="1.5"/><circle cx="1520" cy="80" r="1.5"/><circle cx="1600" cy="80" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/><circle cx="160" cy="160" r="1.5"/><circle cx="240" cy="160" r="1.5"/><circle cx="320" cy="160" r="1.5"/><circle cx="400" cy="160" r="1.5"/>
    <circle cx="480" cy="160" r="1.5"/><circle cx="560" cy="160" r="1.5"/><circle cx="640" cy="160" r="1.5"/><circle cx="720" cy="160" r="1.5"/><circle cx="800" cy="160" r="1.5"/>
    <circle cx="880" cy="160" r="1.5"/><circle cx="960" cy="160" r="1.5"/><circle cx="1040" cy="160" r="1.5"/><circle cx="1120" cy="160" r="1.5"/><circle cx="1200" cy="160" r="1.5"/>
    <circle cx="1280" cy="160" r="1.5"/><circle cx="1360" cy="160" r="1.5"/><circle cx="1440" cy="160" r="1.5"/><circle cx="1520" cy="160" r="1.5"/><circle cx="1600" cy="160" r="1.5"/>
    <circle cx="80" cy="240" r="1.5"/><circle cx="160" cy="240" r="1.5"/><circle cx="240" cy="240" r="1.5"/><circle cx="320" cy="240" r="1.5"/><circle cx="400" cy="240" r="1.5"/>
    <circle cx="480" cy="240" r="1.5"/><circle cx="560" cy="240" r="1.5"/><circle cx="640" cy="240" r="1.5"/><circle cx="720" cy="240" r="1.5"/><circle cx="800" cy="240" r="1.5"/>
    <circle cx="880" cy="240" r="1.5"/><circle cx="960" cy="240" r="1.5"/><circle cx="1040" cy="240" r="1.5"/><circle cx="1120" cy="240" r="1.5"/><circle cx="1200" cy="240" r="1.5"/>
    <circle cx="1280" cy="240" r="1.5"/><circle cx="1360" cy="240" r="1.5"/><circle cx="1440" cy="240" r="1.5"/><circle cx="1520" cy="240" r="1.5"/><circle cx="1600" cy="240" r="1.5"/>
    <circle cx="80" cy="320" r="1.5"/><circle cx="160" cy="320" r="1.5"/><circle cx="240" cy="320" r="1.5"/><circle cx="320" cy="320" r="1.5"/><circle cx="400" cy="320" r="1.5"/>
    <circle cx="480" cy="320" r="1.5"/><circle cx="560" cy="320" r="1.5"/><circle cx="640" cy="320" r="1.5"/><circle cx="720" cy="320" r="1.5"/><circle cx="800" cy="320" r="1.5"/>
    <circle cx="880" cy="320" r="1.5"/><circle cx="960" cy="320" r="1.5"/><circle cx="1040" cy="320" r="1.5"/><circle cx="1120" cy="320" r="1.5"/><circle cx="1200" cy="320" r="1.5"/>
    <circle cx="1280" cy="320" r="1.5"/><circle cx="1360" cy="320" r="1.5"/><circle cx="1440" cy="320" r="1.5"/><circle cx="1520" cy="320" r="1.5"/><circle cx="1600" cy="320" r="1.5"/>
    <circle cx="80" cy="400" r="1.5"/><circle cx="160" cy="400" r="1.5"/><circle cx="240" cy="400" r="1.5"/><circle cx="320" cy="400" r="1.5"/><circle cx="400" cy="400" r="1.5"/>
    <circle cx="480" cy="400" r="1.5"/><circle cx="560" cy="400" r="1.5"/><circle cx="640" cy="400" r="1.5"/><circle cx="720" cy="400" r="1.5"/><circle cx="800" cy="400" r="1.5"/>
    <circle cx="880" cy="400" r="1.5"/><circle cx="960" cy="400" r="1.5"/><circle cx="1040" cy="400" r="1.5"/><circle cx="1120" cy="400" r="1.5"/><circle cx="1200" cy="400" r="1.5"/>
    <circle cx="1280" cy="400" r="1.5"/><circle cx="1360" cy="400" r="1.5"/><circle cx="1440" cy="400" r="1.5"/><circle cx="1520" cy="400" r="1.5"/><circle cx="1600" cy="400" r="1.5"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════
       NEURAL NETWORK — 4 layers (Input → Hidden1 → Hidden2 → Output)
       ═══════════════════════════════════════════════════════════════════ -->

  <!-- Ambient glow behind network -->
  <circle cx="960" cy="380" r="250" fill="#7c4dff" opacity="0.04" filter="url(#softGlow)"/>

  <!-- CONNECTION LINES (drawn first, behind nodes) -->
  <g stroke="#7c4dff" opacity="0.15" stroke-width="1.5">
    <!-- Input (4 nodes) to Hidden1 (6 nodes) -->
    <line x1="720" y1="160" x2="880" y2="120"/><line x1="720" y1="160" x2="880" y2="220"/>
    <line x1="720" y1="160" x2="880" y2="320"/><line x1="720" y1="160" x2="880" y2="420"/>
    <line x1="720" y1="290" x2="880" y2="120"/><line x1="720" y1="290" x2="880" y2="220"/>
    <line x1="720" y1="290" x2="880" y2="320"/><line x1="720" y1="290" x2="880" y2="420"/>
    <line x1="720" y1="290" x2="880" y2="520"/><line x1="720" y1="290" x2="880" y2="620"/>
    <line x1="720" y1="420" x2="880" y2="120"/><line x1="720" y1="420" x2="880" y2="220"/>
    <line x1="720" y1="420" x2="880" y2="320"/><line x1="720" y1="420" x2="880" y2="420"/>
    <line x1="720" y1="420" x2="880" y2="520"/><line x1="720" y1="420" x2="880" y2="620"/>
    <line x1="720" y1="550" x2="880" y2="220"/><line x1="720" y1="550" x2="880" y2="320"/>
    <line x1="720" y1="550" x2="880" y2="420"/><line x1="720" y1="550" x2="880" y2="520"/>
    <line x1="720" y1="550" x2="880" y2="620"/>
    <!-- Hidden1 (6 nodes) to Hidden2 (6 nodes) -->
    <line x1="880" y1="120" x2="1060" y2="120"/><line x1="880" y1="120" x2="1060" y2="220"/>
    <line x1="880" y1="120" x2="1060" y2="320"/><line x1="880" y1="220" x2="1060" y2="120"/>
    <line x1="880" y1="220" x2="1060" y2="220"/><line x1="880" y1="220" x2="1060" y2="320"/>
    <line x1="880" y1="220" x2="1060" y2="420"/><line x1="880" y1="320" x2="1060" y2="220"/>
    <line x1="880" y1="320" x2="1060" y2="320"/><line x1="880" y1="320" x2="1060" y2="420"/>
    <line x1="880" y1="320" x2="1060" y2="520"/><line x1="880" y1="420" x2="1060" y2="320"/>
    <line x1="880" y1="420" x2="1060" y2="420"/><line x1="880" y1="420" x2="1060" y2="520"/>
    <line x1="880" y1="420" x2="1060" y2="620"/><line x1="880" y1="520" x2="1060" y2="420"/>
    <line x1="880" y1="520" x2="1060" y2="520"/><line x1="880" y1="520" x2="1060" y2="620"/>
    <line x1="880" y1="620" x2="1060" y2="520"/><line x1="880" y1="620" x2="1060" y2="620"/>
    <!-- Hidden2 (6 nodes) to Output (3 nodes) -->
    <line x1="1060" y1="120" x2="1220" y2="220"/><line x1="1060" y1="120" x2="1220" y2="370"/>
    <line x1="1060" y1="220" x2="1220" y2="220"/><line x1="1060" y1="220" x2="1220" y2="370"/>
    <line x1="1060" y1="320" x2="1220" y2="220"/><line x1="1060" y1="320" x2="1220" y2="370"/>
    <line x1="1060" y1="320" x2="1220" y2="520"/><line x1="1060" y1="420" x2="1220" y2="370"/>
    <line x1="1060" y1="420" x2="1220" y2="520"/><line x1="1060" y1="520" x2="1220" y2="370"/>
    <line x1="1060" y1="520" x2="1220" y2="520"/><line x1="1060" y1="620" x2="1220" y2="520"/>
  </g>

  <!-- Highlighted active connections -->
  <g stroke="#b388ff" opacity="0.35" stroke-width="2" filter="url(#glow)">
    <line x1="720" y1="290" x2="880" y2="320"/>
    <line x1="880" y1="320" x2="1060" y2="420"/>
    <line x1="1060" y1="420" x2="1220" y2="370"/>
    <line x1="720" y1="420" x2="880" y2="420"/>
    <line x1="880" y1="420" x2="1060" y2="320"/>
    <line x1="1060" y1="320" x2="1220" y2="220"/>
  </g>

  <!-- INPUT LAYER — 4 nodes -->
  <g filter="url(#glow)">
    <circle cx="720" cy="160" r="18" fill="#4527a0" stroke="#9575cd" stroke-width="2"/>
    <circle cx="720" cy="290" r="18" fill="#4527a0" stroke="#9575cd" stroke-width="2"/>
    <circle cx="720" cy="420" r="18" fill="#4527a0" stroke="#9575cd" stroke-width="2"/>
    <circle cx="720" cy="550" r="18" fill="#4527a0" stroke="#9575cd" stroke-width="2"/>
    <!-- Inner dots -->
    <circle cx="720" cy="160" r="6" fill="#b388ff" opacity="0.7"/>
    <circle cx="720" cy="290" r="6" fill="#b388ff" opacity="0.9"/>
    <circle cx="720" cy="420" r="6" fill="#b388ff" opacity="0.8"/>
    <circle cx="720" cy="550" r="6" fill="#b388ff" opacity="0.5"/>
  </g>

  <!-- HIDDEN LAYER 1 — 6 nodes -->
  <g filter="url(#glow)">
    <circle cx="880" cy="120" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="880" cy="220" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="880" cy="320" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="880" cy="420" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="880" cy="520" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="880" cy="620" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <!-- Activation indicators -->
    <circle cx="880" cy="120" r="5" fill="#00e676" opacity="0.4"/>
    <circle cx="880" cy="220" r="5" fill="#00e676" opacity="0.7"/>
    <circle cx="880" cy="320" r="5" fill="#00e676" opacity="0.9"/>
    <circle cx="880" cy="420" r="5" fill="#ffab00" opacity="0.8"/>
    <circle cx="880" cy="520" r="5" fill="#00e676" opacity="0.5"/>
    <circle cx="880" cy="620" r="5" fill="#00e676" opacity="0.3"/>
  </g>

  <!-- HIDDEN LAYER 2 — 6 nodes -->
  <g filter="url(#glow)">
    <circle cx="1060" cy="120" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="1060" cy="220" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="1060" cy="320" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="1060" cy="420" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="1060" cy="520" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="1060" cy="620" r="16" fill="#5e35b1" stroke="#b388ff" stroke-width="1.5"/>
    <circle cx="1060" cy="120" r="5" fill="#00e676" opacity="0.3"/>
    <circle cx="1060" cy="220" r="5" fill="#00e676" opacity="0.6"/>
    <circle cx="1060" cy="320" r="5" fill="#ffab00" opacity="0.9"/>
    <circle cx="1060" cy="420" r="5" fill="#00e676" opacity="0.8"/>
    <circle cx="1060" cy="520" r="5" fill="#00e676" opacity="0.5"/>
    <circle cx="1060" cy="620" r="5" fill="#00e676" opacity="0.4"/>
  </g>

  <!-- OUTPUT LAYER — 3 nodes -->
  <g filter="url(#bigGlow)">
    <circle cx="1220" cy="220" r="20" fill="#7c4dff" stroke="#b388ff" stroke-width="2"/>
    <circle cx="1220" cy="370" r="20" fill="#7c4dff" stroke="#b388ff" stroke-width="2"/>
    <circle cx="1220" cy="520" r="20" fill="#7c4dff" stroke="#b388ff" stroke-width="2"/>
    <circle cx="1220" cy="220" r="7" fill="#00e676" opacity="0.8"/>
    <circle cx="1220" cy="370" r="7" fill="#ffab00" opacity="0.9"/>
    <circle cx="1220" cy="520" r="7" fill="#00e676" opacity="0.6"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════
       LAYER LABELS
       ═══════════════════════════════════════════════════════════════════ -->
  <g font-family="'JetBrains Mono', monospace" fill="#9575cd" opacity="0.4" text-anchor="middle">
    <text x="720" y="710" font-size="13">Sisend</text>
    <text x="880" y="710" font-size="13">Peidetud kiht 1</text>
    <text x="1060" y="710" font-size="13">Peidetud kiht 2</text>
    <text x="1220" y="710" font-size="13">Väljund</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════
       INPUT ICONS (left side — text, image, code)
       ═══════════════════════════════════════════════════════════════════ -->
  <g filter="url(#glow)">
    <!-- Text input icon -->
    <g transform="translate(600, 152)">
      <rect x="0" y="0" width="32" height="22" rx="3" fill="#4527a0" opacity="0.8"/>
      <line x1="5" y1="6" x2="22" y2="6" stroke="#b388ff" stroke-width="1.5" opacity="0.6"/>
      <line x1="5" y1="11" x2="18" y2="11" stroke="#b388ff" stroke-width="1.5" opacity="0.4"/>
      <line x1="5" y1="16" x2="25" y2="16" stroke="#b388ff" stroke-width="1.5" opacity="0.5"/>
    </g>
    <!-- Image input icon -->
    <g transform="translate(598, 280)">
      <rect x="0" y="0" width="28" height="24" rx="3" fill="#4527a0" opacity="0.8"/>
      <circle cx="10" cy="9" r="3" fill="#ffab00" opacity="0.6"/>
      <polyline points="4,20 10,13 15,16 20,10 24,15" fill="none" stroke="#00e676" stroke-width="1.5" opacity="0.5"/>
    </g>
    <!-- Code input icon -->
    <g transform="translate(596, 412)">
      <rect x="0" y="0" width="32" height="22" rx="3" fill="#4527a0" opacity="0.8"/>
      <text x="16" y="15" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00e676" opacity="0.7">&lt;/&gt;</text>
    </g>
    <!-- Data input icon -->
    <g transform="translate(600, 542)">
      <rect x="0" y="0" width="28" height="20" rx="3" fill="#4527a0" opacity="0.8"/>
      <text x="14" y="14" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#b388ff" opacity="0.6">01</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════
       OUTPUT LABELS (right side)
       ═══════════════════════════════════════════════════════════════════ -->
  <g filter="url(#glow)">
    <g transform="translate(1260, 210)">
      <rect x="0" y="0" width="80" height="24" rx="4" fill="#4527a0" opacity="0.7"/>
      <text x="40" y="16" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00e676" opacity="0.8">Tekst</text>
    </g>
    <g transform="translate(1260, 360)">
      <rect x="0" y="0" width="80" height="24" rx="4" fill="#4527a0" opacity="0.7"/>
      <text x="40" y="16" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ffab00" opacity="0.8">Kood</text>
    </g>
    <g transform="translate(1260, 510)">
      <rect x="0" y="0" width="80" height="24" rx="4" fill="#4527a0" opacity="0.7"/>
      <text x="40" y="16" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00e676" opacity="0.8">Pilt</text>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════
       FLOATING AI TERMS (ambient decoration)
       ═══════════════════════════════════════════════════════════════════ -->
  <g font-family="'JetBrains Mono', monospace" fill="#b388ff" opacity="0.10">
    <text x="120" y="200" font-size="12">transformer</text>
    <text x="1500" y="180" font-size="12">attention</text>
    <text x="150" y="450" font-size="11">tokenizer</text>
    <text x="1520" y="450" font-size="11">embedding</text>
    <text x="100" y="650" font-size="11">temperature=0.7</text>
    <text x="1550" y="650" font-size="11">top_p=0.9</text>
    <text x="350" y="100" font-size="10">softmax</text>
    <text x="1450" y="100" font-size="10">backpropagation</text>
    <text x="200" y="350" font-size="10">gradient</text>
    <text x="1400" y="320" font-size="10">loss function</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════════
       CENTRAL BRAIN ICON (subtle, behind network)
       ═══════════════════════════════════════════════════════════════════ -->
  <g transform="translate(960, 380)" opacity="0.06">
    <circle cx="0" cy="0" r="180" fill="none" stroke="#b388ff" stroke-width="1"/>
    <circle cx="0" cy="0" r="140" fill="none" stroke="#b388ff" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#b388ff" stroke-width="0.5"/>
  </g>

  <!-- Data flow particles -->
  <g filter="url(#glow)">
    <circle cx="800" cy="225" r="3.5" fill="#00e676" opacity="0.7"/>
    <circle cx="970" cy="370" r="3.5" fill="#ffab00" opacity="0.6"/>
    <circle cx="1140" cy="295" r="3.5" fill="#00e676" opacity="0.5"/>
    <circle cx="830" cy="470" r="3" fill="#b388ff" opacity="0.5"/>
    <circle cx="1100" cy="550" r="3" fill="#b388ff" opacity="0.4"/>
  </g>

  <!-- Bottom fade -->
  <rect x="0" y="740" width="1920" height="60" fill="#1a0a2e" opacity="0.5"/>
</svg>
